<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artemis Mission Control</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #020111, #000);
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.container {
  display: grid;
  grid-template-columns: 4fr 1fr;
  height: 100vh;
}

.space {
  position: relative;
}

/* Stars (parallax layers) */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
}

/* Earth */
.earth {
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  left: 8%;
  top: 55%;
  transform: translateY(-50%);
  background: url("https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg");
  background-size: cover;
  animation: rotateEarth 25s linear infinite;
  box-shadow: 0 0 40px rgba(0,150,255,0.9);
}

@keyframes rotateEarth {
  from { background-position: 0 0; }
  to { background-position: 200% 0; }
}

/* Moon */
.moon {
  position: absolute;
  width: 70px;
  height: 70px;
  right: 8%;
  top: 45%;
  transform: translateY(-50%);
  border-radius: 50%;
  background: #ccc;
  box-shadow: 0 0 25px white;
}

/* Ship */
.ship {
  position: absolute;
  width: 16px;
  height: 16px;
  background: red;
  border-radius: 50%;
  box-shadow: 0 0 20px red;
  transform-origin: center;
}

/* SVG */
svg {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* Labels */
.label {
  position: absolute;
  font-size: 12px;
  color: #ccc;
}

/* Panel */
.panel {
  background: rgba(0,0,0,0.85);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

h1 {
  text-align: center;
}

.data {
  font-size: 1.1em;
}

.sub {
  color: #aaa;
  font-size: 0.8em;
}

/* Graph */
canvas {
  background: #111;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="space" id="space"></div>

  <div class="panel">
    <h1>🚀 ARTEMIS II</h1>

    <div class="data"><div class="sub">Velocity</div><div id="speed"></div></div>
    <div class="data"><div class="sub">Distance</div><div id="distance"></div></div>
    <div class="data"><div class="sub">Mission Time</div><div id="time"></div></div>
    <div class="data"><div class="sub">Phase</div><div id="phase"></div></div>

    <canvas id="graph" width="300" height="150"></canvas>
  </div>

</div>

<script>
const space = document.getElementById("space");

/* Stars */
for(let i=0;i<250;i++){
  let s=document.createElement("div");
  s.className="star";
  let size=Math.random()*2+1;
  s.style.width=size+"px";
  s.style.height=size+"px";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  s.style.opacity=Math.random();
  space.appendChild(s);
}

/* Earth & Moon */
space.innerHTML += `<div class="earth"></div><div class="moon"></div>`;

/* SVG */
space.innerHTML += `
<svg viewBox="0 0 1000 500">
  <path id="orbit"
    d="M 100 300 Q 500 50 900 250"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="2"
    fill="none"/>

  <path id="progress"
    d="M 100 300 Q 500 50 900 250"
    stroke="rgba(255,60,60,0.95)"
    stroke-width="3"
    fill="none"
    stroke-linecap="round"
    style="filter: drop-shadow(0 0 6px red);"
    stroke-dasharray="0 1000"/>
</svg>
`;

/* Labels */
function addLabel(text, x, y){
  let l=document.createElement("div");
  l.className="label";
  l.innerText=text;
  l.style.left=x+"%";
  l.style.top=y+"%";
  space.appendChild(l);
}

addLabel("LEO",15,60);
addLabel("TLI",40,30);
addLabel("MIDCOURSE",60,40);
addLabel("FLYBY",85,45);

/* Ship */
let ship=document.createElement("div");
ship.className="ship";
space.appendChild(ship);

const path = document.getElementById("orbit");
const progressPath = document.getElementById("progress");

let t = 0;
let time = 0;
let history = [];

/* Graph */
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

function drawGraph(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();

  history.forEach((v,i)=>{
    let x=i*(canvas.width/100);
    let y=canvas.height-(v/35000)*canvas.height;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle="lime";
  ctx.stroke();
}

function formatTime(t){
  let h=Math.floor(t/3600);
  let m=Math.floor((t%3600)/60);
  let s=t%60;
  return `T+ ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function update(){
  t+=0.0015;
  time++;

  if(t>1) t=0;

  let total=path.getTotalLength();
  let current=t*total;

  let p1=path.getPointAtLength(current);
  let p2=path.getPointAtLength(current+1);

  /* Position */
  ship.style.left=p1.x+"px";
  ship.style.top=p1.y+"px";

  /* Rotation */
  let angle=Math.atan2(p2.y-p1.y,p2.x-p1.x)*180/Math.PI;
  ship.style.transform=`translate(-50%,-50%) rotate(${angle}deg)`;

  /* Path progress */
  progressPath.style.strokeDasharray=current+" "+total;

  /* Physics-inspired */
  let velocity=28000+6000*Math.cos(Math.PI*t);
  let distance=384400*(1-t);

  history.push(velocity);
  if(history.length>100) history.shift();
  drawGraph();

  document.getElementById("speed").innerText=Math.round(velocity).toLocaleString()+" km/h";
  document.getElementById("distance").innerText=Math.round(distance).toLocaleString()+" km";
  document.getElementById("time").innerText=formatTime(time);

  let phase="Launch";
  if(t>0.2) phase="LEO";
  if(t>0.4) phase="TLI Burn";
  if(t>0.7) phase="Midcourse";
  if(t>0.9) phase="Flyby";

  document.getElementById("phase").innerText=phase;
}

setInterval(update,50);
</script>

</body>
</html>
