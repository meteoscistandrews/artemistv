<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artemis II Mission Control</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #020111, #000);
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.container {
  display: grid;
  grid-template-columns: 3fr 1fr;
  height: 100vh;
}

/* SPACE */
.space {
  position: relative;
}

/* Earth */
.earth {
  position: absolute;
  width: 120px;
  height: 120px;
  border-radius: 50%;
  left: 10%;
  top: 50%;
  transform: translateY(-50%);
  background: url("https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg");
  background-size: cover;
  animation: rotateEarth 20s linear infinite;
  box-shadow: 0 0 30px rgba(0,150,255,0.8);
}

@keyframes rotateEarth {
  from { background-position: 0 0; }
  to { background-position: 200% 0; }
}

/* Moon */
.moon {
  position: absolute;
  width: 60px;
  height: 60px;
  right: 10%;
  top: 50%;
  transform: translateY(-50%);
  border-radius: 50%;
  background: #ccc;
  box-shadow: 0 0 20px white;
}

/* Ship */
.ship {
  position: absolute;
  width: 16px;
  height: 16px;
  background: red;
  border-radius: 50%;
  box-shadow: 0 0 20px red;
}

/* Trail */
.trail {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,0,0,0.3);
  border-radius: 50%;
}

/* PANEL */
.panel {
  background: rgba(0,0,0,0.7);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-between;
}

h1 {
  text-align: center;
}

.data {
  font-size: 1.2em;
}

.label {
  color: #aaa;
  font-size: 0.8em;
}

/* Graph */
canvas {
  background: #111;
  border-radius: 10px;
}
</style>
</head>

<body>

<div class="container">

  <div class="space" id="space">
    <div class="earth"></div>
    <div class="moon"></div>
    <div class="ship" id="ship"></div>
  </div>

  <div class="panel">
    <h1>🚀 ARTEMIS II</h1>

    <div class="data"><div class="label">Velocity</div><div id="speed"></div></div>
    <div class="data"><div class="label">Distance to Moon</div><div id="distance"></div></div>
    <div class="data"><div class="label">Mission Time</div><div id="time"></div></div>
    <div class="data"><div class="label">Phase</div><div id="phase"></div></div>

    <canvas id="graph" width="300" height="150"></canvas>
  </div>

</div>

<script>
const ship = document.getElementById("ship");
const space = document.getElementById("space");

let t = 0;
let time = 0;
let velocityHistory = [];

// GRAPH
const canvas = document.getElementById("graph");
const ctx = canvas.getContext("2d");

function drawGraph() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.beginPath();

  velocityHistory.forEach((v,i) => {
    let x = i * (canvas.width / 100);
    let y = canvas.height - (v / 32000) * canvas.height;
    if(i===0) ctx.moveTo(x,y);
    else ctx.lineTo(x,y);
  });

  ctx.strokeStyle = "lime";
  ctx.stroke();
}

// TIME FORMAT
function formatTime(t){
  let h = Math.floor(t/3600);
  let m = Math.floor((t%3600)/60);
  let s = t%60;
  return `T+ ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

// MAIN LOOP
function update(){
  t += 0.002;
  time++;

  if(t > 1) t = 0;

  // Elliptical path
  let x = 10 + 80 * t;
  let y = 50 - 20 * Math.sin(Math.PI * t);

  ship.style.left = x + "%";
  ship.style.top = y + "%";

  // Trail
  let trail = document.createElement("div");
  trail.className = "trail";
  trail.style.left = x + "%";
  trail.style.top = y + "%";
  space.appendChild(trail);

  setTimeout(()=>trail.remove(), 2000);

  // Physics-inspired velocity
  let velocity = 28000 + 4000*Math.cos(Math.PI*t);

  velocityHistory.push(velocity);
  if(velocityHistory.length > 100) velocityHistory.shift();

  drawGraph();

  let distance = 384400 * (1 - t);

  document.getElementById("speed").innerText = Math.round(velocity).toLocaleString()+" km/h";
  document.getElementById("distance").innerText = Math.round(distance).toLocaleString()+" km";
  document.getElementById("time").innerText = formatTime(time);

  let phase = "Launch";
  if(t>0.2) phase="Earth Orbit";
  if(t>0.4) phase="Trans-Lunar Injection";
  if(t>0.7) phase="Approach";
  if(t>0.9) phase="Flyby";

  document.getElementById("phase").innerText = phase;
}

setInterval(update, 50);
</script>

</body>
</html>
