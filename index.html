<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Artemis Trajectory Display</title>

<style>
body {
  margin: 0;
  background: radial-gradient(circle at center, #020111, #000);
  color: white;
  font-family: Arial, sans-serif;
  overflow: hidden;
}

.container {
  display: grid;
  grid-template-columns: 4fr 1fr;
  height: 100vh;
}

/* SPACE */
.space {
  position: relative;
}

/* Stars */
.star {
  position: absolute;
  background: white;
  border-radius: 50%;
}

/* Earth */
.earth {
  position: absolute;
  width: 140px;
  height: 140px;
  border-radius: 50%;
  left: 8%;
  top: 55%;
  transform: translateY(-50%);
  background: url("https://upload.wikimedia.org/wikipedia/commons/9/97/The_Earth_seen_from_Apollo_17.jpg");
  background-size: cover;
  box-shadow: 0 0 40px rgba(0,150,255,0.9);
}

/* Moon */
.moon {
  position: absolute;
  width: 70px;
  height: 70px;
  right: 8%;
  top: 45%;
  transform: translateY(-50%);
  border-radius: 50%;
  background: #ccc;
  box-shadow: 0 0 25px white;
}

/* SVG */
svg {
  position: absolute;
  width: 100%;
  height: 100%;
}

/* Ship */
.ship {
  position: absolute;
  width: 14px;
  height: 14px;
  background: red;
  border-radius: 50%;
  box-shadow: 0 0 20px red;
  transform: translate(-50%, -50%);
}

/* Panel */
.panel {
  background: rgba(0,0,0,0.85);
  padding: 20px;
  display: flex;
  flex-direction: column;
  justify-content: space-around;
}

h1 {
  text-align: center;
}

.data {
  font-size: 1.2em;
}

.label {
  color: #aaa;
  font-size: 0.8em;
}
</style>
</head>

<body>

<div class="container">

  <div class="space" id="space"></div>

  <!-- PANEL -->
  <div class="panel">
    <h1>🚀 ARTEMIS II</h1>

    <div class="data"><div class="label">Velocity</div><div id="speed"></div></div>
    <div class="data"><div class="label">Distance to Moon</div><div id="distance"></div></div>
    <div class="data"><div class="label">Mission Time</div><div id="time"></div></div>
    <div class="data"><div class="label">Phase</div><div id="phase"></div></div>
  </div>

</div>

<script>
const space = document.getElementById("space");

/* ⭐ STAR FIELD */
for(let i=0;i<200;i++){
  let s=document.createElement("div");
  s.className="star";
  let size=Math.random()*2+1;
  s.style.width=size+"px";
  s.style.height=size+"px";
  s.style.top=Math.random()*100+"%";
  s.style.left=Math.random()*100+"%";
  s.style.opacity=Math.random();
  space.appendChild(s);
}

/* 🌍 Earth */
let earth=document.createElement("div");
earth.className="earth";
space.appendChild(earth);

/* 🌙 Moon */
let moon=document.createElement("div");
moon.className="moon";
space.appendChild(moon);

/* 🛰️ SVG PATH */
space.innerHTML += `
<svg viewBox="0 0 1000 500">

  <!-- Full path -->
  <path id="orbit"
    d="M 100 300 Q 500 50 900 250"
    stroke="rgba(255,255,255,0.2)"
    stroke-width="2"
    fill="none"/>

  <!-- Traveled path -->
  <path id="progress"
    d="M 100 300 Q 500 50 900 250"
    stroke="rgba(255,60,60,0.95)"
    stroke-width="3"
    fill="none"
    stroke-linecap="round"
    style="filter: drop-shadow(0 0 6px red);"
    stroke-dasharray="0 1000"/>
</svg>
`;

/* 🚀 Ship */
let ship=document.createElement("div");
ship.className="ship";
space.appendChild(ship);

const path = document.getElementById("orbit");
const progressPath = document.getElementById("progress");

let t = 0;
let time = 0;

function formatTime(t){
  let h=Math.floor(t/3600);
  let m=Math.floor((t%3600)/60);
  let s=t%60;
  return `T+ ${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}

function update(){
  t += 0.0015;
  time++;

  if(t>1) t=0;

  let totalLength = path.getTotalLength();
  let currentLength = t * totalLength;

  /* 🚀 Ship position */
  let point = path.getPointAtLength(currentLength);
  ship.style.left = point.x + "px";
  ship.style.top = point.y + "px";

  /* 🔴 Traveled path */
  progressPath.style.strokeDasharray = currentLength + " " + totalLength;

  /* 📊 Telemetry */
  let velocity = 28000 + 5000*Math.cos(Math.PI*t);
  let distance = 384400*(1-t);

  document.getElementById("speed").innerText =
    Math.round(velocity).toLocaleString()+" km/h";

  document.getElementById("distance").innerText =
    Math.round(distance).toLocaleString()+" km";

  document.getElementById("time").innerText = formatTime(time);

  let phase="Launch";
  if(t>0.2) phase="Earth Orbit";
  if(t>0.4) phase="Trans-Lunar Injection";
  if(t>0.7) phase="Approach";
  if(t>0.9) phase="Flyby";

  document.getElementById("phase").innerText=phase;
}

setInterval(update,50);
</script>

</body>
</html>
